name: Run Decoder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-decoder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: decoder-image:latest
          cache-from: |
            type=local,src=/tmp/.buildx-cache
          cache-to: |
            type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Create output directories
        run: |
          mkdir -p ${{ github.workspace }}/plots/cluster
          mkdir -p ${{ github.workspace }}/results
          mkdir -p ${{ github.workspace }}/artifacts/hf_cache
          mkdir -p ${{ github.workspace }}/artifacts/label_encoder_cache_minilm_universal
          chmod -R 777 ${{ github.workspace }}/plots
          chmod -R 777 ${{ github.workspace }}/results
          chmod -R 777 ${{ github.workspace }}/artifacts

      - name: Verify checkpoint files
        run: |
          test -f ${{ github.workspace }}/ckpt/universal/model_universal_hybrid_minilm_rgcn.pt
          test -f ${{ github.workspace }}/ckpt/universal/model_universal_hybrid_minilm_rgcn.pt.meta.json

      - name: Run decoder benchmarks
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -e PYTHONUNBUFFERED=1 \
            -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -e HUGGING_FACE_HUB_TOKEN=${{ secrets.HF_TOKEN }} \
            -e HF_HOME=/app/artifacts/hf_cache \
            -e SENTENCE_TRANSFORMERS_HOME=/app/artifacts/hf_cache/sentence_transformers \
            decoder-image:latest \
            bash -c '
              set -uo pipefail

              echo Converting email-Eu-core to email_eu_core.pkl...
              python scripts/convert_email_dataset.py \
                --input email-Eu-core.txt.gz \
                --output email_eu_core.pkl

              test -f /app/email_eu_core.pkl

              echo Preparing MiniLM semantic label cache for email_eu_core.pkl...
              python scripts/precompute_label_cache.py \
                --graph_pkl email_eu_core.pkl \
                --cache_dir /app/artifacts/label_encoder_cache_minilm_universal \
                --backend sentence_transformers \
                --label_encoder_name sentence-transformers/all-MiniLM-L6-v2 \
                --batch_size 128

              echo Verifying cache-only semantic path...
              python scripts/precompute_label_cache.py \
                --graph_pkl email_eu_core.pkl \
                --cache_dir /app/artifacts/label_encoder_cache_minilm_universal \
                --backend cache_only \
                --label_encoder_name sentence-transformers/all-MiniLM-L6-v2 \
                --batch_size 128

              STRS=(greedy mcts beam)

              declare -A CONFIGS
              CONFIGS=(
                [small]="n_trials=100 n_neighborhoods=200 min_neighborhood_size=3 max_neighborhood_size=6 radius=3"
                [medium]="n_trials=300 n_neighborhoods=800 min_neighborhood_size=4 max_neighborhood_size=12 radius=4"
                [large]="n_trials=800 n_neighborhoods=1500 min_neighborhood_size=5 max_neighborhood_size=20 radius=5"
              )

              for strat in "${STRS[@]}"; do
                for cfg in small medium large; do
                  eval "${CONFIGS[$cfg]}"

                  OUT_PATH=/app/results/patterns_${strat}_${cfg}.pkl
                  LOG_PATH=/app/results/decoder_${strat}_${cfg}.log

                  echo "Running strategy=${strat} config=${cfg}..."
                  python -m subgraph_mining.decoder \
                    --dataset=email_eu_core.pkl \
                    --graph_type=directed \
                    --model_path=/app/ckpt/universal/model_universal_hybrid_minilm_rgcn.pt \
                    --vocab_dir=/app/artifacts/vocab_ci_semantic \
                    --n_trials=${n_trials} \
                    --n_neighborhoods=${n_neighborhoods} \
                    --min_pattern_size=3 \
                    --max_pattern_size=4 \
                    --min_neighborhood_size=${min_neighborhood_size} \
                    --max_neighborhood_size=${max_neighborhood_size} \
                    --search_strategy=${strat} \
                    --memory_efficient \
                    --out_batch_size=2 \
                    --streaming_workers=0 \
                    --radius=${radius} \
                    --out_path=${OUT_PATH} \
                    > >(tee ${LOG_PATH}) 2>&1 || true

                  python scripts/collect_metrics.py \
                    "${LOG_PATH}" "${OUT_PATH}" "${strat}" "${cfg}" \
                    "${n_trials}" "${n_neighborhoods}" \
                    "${min_neighborhood_size}" "${max_neighborhood_size}" \
                    "${radius}" /app/results/benchmark_results.csv || true
                done
              done

              echo Generating plots...
              python scripts/generate_plots.py || true

              echo Checking outputs...
              ls -la /app/results
              ls -la /app/plots/cluster
            '

      - name: Check for generated files
        run: |
          echo "Checking plots directory:"
          ls -R plots/ || echo "No plots directory found"
          echo "Checking results directory:"
          ls -R results/ || echo "No results directory found"

      - name: Upload plots and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decoder-plots
          path: |
            plots/
            results/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decoder-logs
          path: |
            *.log
            *.err
          if-no-files-found: ignore
